name: Accessibility CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: a11y-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  a11y-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build web app
        run: pnpm --filter web build

      - name: Start web app
        run: |
          pnpm --filter web start &
          # Wait for the server to be ready
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run accessibility tests
        id: a11y-tests
        continue-on-error: true
        run: pnpm test:a11y

      - name: Generate a11y report
        id: report
        if: always()
        run: npx tsx scripts/a11y-report.ts

      - name: Upload a11y results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-results
          path: apps/web/tests/a11y/results/
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const mdPath = 'apps/web/tests/a11y/results/a11y-summary.md';
            let body = '## Accessibility Scan Results\n\nNo results generated.';
            if (fs.existsSync(mdPath)) {
              body = fs.readFileSync(mdPath, 'utf-8');
            }
            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## Accessibility Scan Results';
            const existing = comments.find(c => c.body?.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on blocking violations
        if: steps.report.outcome == 'failure'
        run: |
          echo "Critical or serious accessibility violations detected — blocking merge."
          exit 1
